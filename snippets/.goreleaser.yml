# goreleaser config for the `snippets` CLI. Triggered by .github/workflows/
# release-snippets.yml after release-please cuts a `snippets/vX.Y.Z` tag.
#
# Each binary embeds the canonical sdks/ tree at build time (see
# snippets/embedded.go). Cosign keyless-signs each artifact + the
# checksums file using the workflow's GitHub OIDC token; consumers
# verify with --certificate-identity-regexp pinned to launchdarkly/
# sdk-meta and --certificate-oidc-issuer https://token.actions.github
# usercontent.com.

version: 2

project_name: snippets

before:
  hooks:
    - go mod download

builds:
  - id: snippets
    main: ./cmd/snippets
    binary: snippets
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/launchdarkly/sdk-meta/snippets/internal/version.Version={{.Version}}

archives:
  # One archive per (os, arch). Inside: just the snippets binary plus a
  # README. Authors download these via `gh release download` in the
  # sync-snippets action.
  - id: default
    formats: [tar.gz]
    name_template: 'snippets_{{ .Version }}_{{ .Os }}_{{ .Arch }}'
    files:
      - LICENSE*
      - README*

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: '{{ incpatch .Version }}-snapshot'

changelog:
  # release-please owns the changelog for the snippets package; goreleaser's
  # auto-generated notes would duplicate it.
  disable: true

# We do NOT let goreleaser publish to GitHub. The release lifecycle is:
#   1. release-please creates a draft GitHub Release (`"draft": true` in
#      release-please-config.json).
#   2. The workflow pushes the git tag at the SHA pointed at by the release.
#   3. goreleaser builds + signs into ./dist (release.disable: true here).
#   4. The workflow runs `gh release upload` to attach every artifact to
#      the still-draft release.
#   5. The workflow runs `gh release edit --draft=false` ONCE, atomically
#      promoting the release. With branch-protected immutable releases,
#      this is the point of no return — every artifact must already be
#      attached.
# If we let goreleaser publish, it would either (a) try to create a new
# (non-draft) release at the tag — colliding with release-please's draft
# — or (b) flip the existing draft to published before signing finished.
release:
  disable: true

# Cosign keyless. Sign each archive + the checksums file, with no key
# material to manage. Verifiers pin the signing identity to this repo.
signs:
  - cmd: cosign
    artifacts: archive
    signature: '${artifact}.sig'
    certificate: '${artifact}.pem'
    args:
      - sign-blob
      - '--output-signature=${signature}'
      - '--output-certificate=${certificate}'
      - '--yes'
      - '${artifact}'

  - cmd: cosign
    artifacts: checksum
    signature: '${artifact}.sig'
    certificate: '${artifact}.pem'
    args:
      - sign-blob
      - '--output-signature=${signature}'
      - '--output-certificate=${certificate}'
      - '--yes'
      - '${artifact}'
