name: Run Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Whether to run the release in dry-run mode. If so, then the package will not be published.'
        type: boolean
        required: true
      prerelease:
        description: 'Whether this is a prerelease. If so, then the latest tag will not be updated in npm.'
        type: boolean
        required: true

jobs:
  release-please:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      package-api-js-released: ${{ steps.release.outputs['api-js--release_created'] }}
      package-snippets-released: ${{ steps.release.outputs['snippets--release_created'] }}
      package-snippets-tag-name: ${{ steps.release.outputs['snippets--tag_name'] }}
    steps:
      # First call: create any GitHub Releases that the merged release-PR(s)
      # called for, but do NOT open / update the rollup PR yet. The snippets
      # package is configured with `"draft": true`, so its release lands as a
      # draft — artifacts are uploaded to it later in this workflow, and the
      # release is flipped to published only after every artifact is in place.
      # That ordering is mandatory under immutable-releases policies.
      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          skip-github-pull-request: true

      # The snippets release is created as a *draft*, which doesn't create
      # the underlying git tag. goreleaser + `gh release upload` need the tag
      # to exist; push it manually at the SHA the release points at. (api-js
      # releases are non-draft, so they auto-create their tag — no manual
      # push needed for that package.)
      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs['snippets--release_created'] == 'true' }}

      - name: Push snippets release tag
        if: ${{ steps.release.outputs['snippets--release_created'] == 'true' }}
        env:
          TAG_NAME: ${{ steps.release.outputs['snippets--tag_name'] }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh api "repos/${{ github.repository }}/git/ref/tags/${TAG_NAME}" >/dev/null 2>&1; then
            echo "Tag ${TAG_NAME} already exists, skipping creation."
          else
            echo "Creating tag ${TAG_NAME}."
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "${TAG_NAME}"
            git push origin "${TAG_NAME}"
          fi

      # Second call: open or update the rollup PR. Skip when we just created
      # a release — the next conventional-commit push will pick up the rollup
      # then.
      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
        if: |
          steps.release.outputs['api-js--release_created'] != 'true' &&
          steps.release.outputs['snippets--release_created'] != 'true'
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          skip-github-release: true

  release-npm:
    runs-on: ubuntu-latest
    needs: release-please
    permissions:
      id-token: write
      contents: write
    if: ${{ needs.release-please.outputs.package-api-js-released == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/publish-npm
        with:
          prerelease: 'false'
          dry_run: 'false'

  manual-publish:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/publish-npm
        with:
          prerelease: ${{ inputs.prerelease }}
          dry_run: ${{ inputs.dry_run }}

  # Build, sign, upload, and PUBLISH the snippets CLI release. The release
  # itself was created in draft mode by the release-please job above; we
  # land every artifact onto the draft, and then flip it to published in a
  # single atomic step at the end. With branch-protected immutable releases
  # enforced on this repo, that flip is the point of no return — every
  # artifact must already be attached.
  release-snippets:
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ needs.release-please.outputs.package-snippets-released == 'true' }}
    permissions:
      contents: write       # upload assets + flip release out of draft
      id-token: write       # OIDC for the attestation signer
      attestations: write   # publish SLSA build provenance to the repo
    env:
      TAG_NAME: ${{ needs.release-please.outputs.package-snippets-tag-name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.package-snippets-tag-name }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: snippets/go.mod

      # The plain semver (e.g. `v0.2.0`) — used for the binary's embedded
      # version stamp and for archive naming. The full prefixed TAG_NAME
      # (e.g. `snippets/v0.2.0`) is what `gh release` calls expect.
      - name: Compute semver tag
        run: echo "SEMVER_TAG=${TAG_NAME#snippets/}" >> "$GITHUB_ENV"

      # Cross-compile the four targets we ship. Plain `go build`; we used
      # to drive this with goreleaser but its monorepo support is Pro-only
      # and the OSS path produced two distinct release-time failures on
      # consecutive releases.
      - name: Cross-compile release artifacts
        working-directory: snippets
        env:
          SEMVER: ${{ env.SEMVER_TAG }}
        run: |
          set -euo pipefail
          mkdir -p dist
          # Bare version for both the embedded ldflag and archive naming.
          # The consumer-side `sync-snippets` action strips `snippets/v`
          # from the tag to derive the archive filename, so the producer
          # must drop the `v` here to match.
          version="${SEMVER#v}"
          ldflags="-s -w -X github.com/launchdarkly/sdk-meta/snippets/internal/version.Version=${version}"
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            goos="${target%/*}"
            goarch="${target#*/}"
            stage=$(mktemp -d)
            CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" \
              go build -trimpath -ldflags "$ldflags" -o "$stage/snippets" ./cmd/snippets
            cp README.md "$stage/"
            cp ../LICENSE "$stage/"
            # Files at archive root (no wrapping subdirectory). The
            # consumer extracts with `tar -xzf <archive> snippets`,
            # which requires the binary to be at the top level.
            tar -C "$stage" -czf "dist/snippets_${version}_${goos}_${goarch}.tar.gz" \
              snippets README.md LICENSE
            rm -rf "$stage"
          done
          cd dist
          sha256sum *.tar.gz > checksums.txt

      # SLSA build-provenance attestation per archive. Stored on GitHub;
      # consumers verify with `gh attestation verify <archive>
      # --repo launchdarkly/sdk-meta`. No sidecar files to manage.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: snippets/dist/*.tar.gz

      - name: Upload artifacts to draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # The four archives + the checksums file. Attestations live on
          # GitHub directly, not as release assets. --clobber so a retry
          # overwrites partial uploads cleanly.
          gh release upload "$TAG_NAME" \
            snippets/dist/*.tar.gz \
            snippets/dist/checksums.txt \
            --clobber

      # Atomic flip. From here, the release is immutable; further uploads
      # would fail under the repo's branch-protected releases policy. Every
      # asset above must be in place before this step runs.
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "$TAG_NAME" --draft=false
