name: Run Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Whether to run the release in dry-run mode. If so, then the package will not be published.'
        type: boolean
        required: true
      prerelease:
        description: 'Whether this is a prerelease. If so, then the latest tag will not be updated in npm.'
        type: boolean
        required: true

jobs:
  release-please:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      package-api-js-released: ${{ steps.release.outputs['api-js--release_created'] }}
      package-snippets-released: ${{ steps.release.outputs['snippets--release_created'] }}
      package-snippets-tag-name: ${{ steps.release.outputs['snippets--tag_name'] }}
    steps:
      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  release-npm:
    runs-on: ubuntu-latest
    needs: release-please
    permissions:
      id-token: write
      contents: write
    if: ${{ needs.release-please.outputs.package-api-js-released == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/publish-npm
        with:
          prerelease: 'false'
          dry_run: 'false'

  manual-publish:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/publish-npm
        with:
          prerelease: ${{ inputs.prerelease }}
          dry_run: ${{ inputs.dry_run }}

  # snippets release: cross-compile the CLI for linux/darwin × amd64/arm64
  # with the canonical sdks/ tree embedded, cosign keyless-sign every
  # archive + the checksums file, and upload everything to the GitHub
  # Release that release-please just created. Consumer-side actions
  # (gonfalon's snippets-sync, ld-docs') verify the signatures by pinning
  # `--certificate-identity-regexp` to this repo + workflow.
  release-snippets:
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ needs.release-please.outputs.package-snippets-released == 'true' }}
    permissions:
      contents: write   # upload assets to the release
      id-token: write   # cosign keyless via OIDC
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # goreleaser wants the full tag history
      - uses: actions/setup-go@v5
        with:
          go-version-file: snippets/go.mod
      - uses: sigstore/cosign-installer@d7d6bc7722e3daa8354c50bcb52f4837da5e9b6a # v3.7.0
      - uses: goreleaser/goreleaser-action@90a3faa9d0182683851fbfa97ca1a2cb983bfca3 # v6.2.1
        with:
          distribution: goreleaser
          version: '~> v2'
          workdir: snippets
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ needs.release-please.outputs.package-snippets-tag-name }}
