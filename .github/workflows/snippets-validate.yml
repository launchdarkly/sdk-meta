name: Validate snippets

# Runs the per-SDK validators in parallel. Each cell delegates to
# `launchdarkly/gh-actions/actions/verify-hello-app@v2.0.1`, which is the
# same action the `hello-*` repos use to:
#   - assume the configured AWS role via OIDC (`vars.AWS_ROLE_ARN_EXAMPLES`)
#   - fetch the LaunchDarkly Sandbox account credentials from Secrets
#     Manager and inject the appropriate key as an env var
#     (LAUNCHDARKLY_SDK_KEY, LAUNCHDARKLY_CLIENT_SIDE_ID, or
#     LAUNCHDARKLY_MOBILE_KEY based on the use_*_key flag)
#   - run `command:` and assert its output contains the EXAM-HELLO
#     `feature flag evaluates to true` line.
#
# Each matrix row declares `key-type: server | client | mobile` so the
# right `use_*_key` flag is set for the SDK under test. The action also
# injects LAUNCHDARKLY_FLAG_KEY from the SSM parameter
# /sdk/common/hello-apps/boolean-flag-key, matching what every hello-*
# repo's CI relies on; we don't set it ourselves.
#
# fail-fast: false so every cell runs to completion. A final `summary` job
# aggregates per-cell artifacts into a markdown table.

on:
  pull_request:
    paths:
      - 'snippets/**'
      - '.github/workflows/snippets-validate.yml'
  workflow_dispatch:

permissions:
  id-token: write    # OIDC for verify-hello-app's AWS role assumption
  contents: read

concurrency:
  group: snippets-validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: ${{ matrix.label || matrix.sdk }}
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # The first block — server-key SDKs — covers both the original
          # sdk-docs scaffold bindings AND the newly-wired sdk-info
          # install/init/flagEval bindings under each SDK's snippets/
          # sdk-info/ group.
          - { sdk: python-server-sdk, runs-on: ubuntu-latest, key-type: server }
          - { sdk: node-server-sdk,   runs-on: ubuntu-latest, key-type: server }
          - { sdk: go-server-sdk,     runs-on: ubuntu-latest, key-type: server }
          - { sdk: java-server-sdk,   runs-on: ubuntu-latest, key-type: server }
          - { sdk: ruby-server-sdk,   runs-on: ubuntu-latest, key-type: server }
          - { sdk: php-server-sdk,    runs-on: ubuntu-latest, key-type: server }
          - { sdk: lua-server-sdk,    runs-on: ubuntu-latest, key-type: server }

          # Client SDKs whose validators run a real bundle and assert
          # a flag evaluation against the LD sandbox env.
          - { sdk: js-client-sdk,     runs-on: ubuntu-latest, key-type: client }

          # Mobile-key SDKs.
          - { sdk: dotnet-client-sdk, runs-on: ubuntu-latest, key-type: mobile }

          # SDKs whose only validatable surface is the shell-install
          # snippets — no init/flagEval bindings yet. The shell-install
          # validator sniffs the body's leading token
          # (npm/pnpm/yarn/pip/go/bower) and runs the real package
          # manager in a clean working dir; no LaunchDarkly key is
          # needed. We pass `key-type: server` so the verify-hello-app
          # action injects an unused server key rather than failing on
          # no-key-set.
          - { sdk: dotnet-server-sdk,       runs-on: ubuntu-latest, key-type: server }

          # Client/mobile-key SDKs with end-to-end init bindings.
          - { sdk: node-client-sdk,         runs-on: ubuntu-latest, key-type: client }
          - { sdk: react-client-sdk,        runs-on: ubuntu-latest, key-type: client }
          - { sdk: vue-client-sdk,          runs-on: ubuntu-latest, key-type: client }

          # React Native init runs under jest with the RN preset (no
          # emulator). Mobile key.
          - { sdk: react-native-client-sdk, runs-on: ubuntu-latest, key-type: mobile }

          # iOS install fragments (Cartfile, Package.swift, Podfile)
          # need real Apple toolchains; macos-latest has Swift +
          # CocoaPods preinstalled. The validator runs in `native` mode
          # because docker isn't available on macos runners.
          # Carthage is installed on-demand via `brew install
          # carthage` in the harness setup step, since macos-latest
          # doesn't ship it preinstalled.
          #
          # iOS validation is split across three rows so each row
          # can carry the correct credentials and toolchain
          # configuration:
          #
          #   - install: just the sdk-info install fragments (no LD
          #     keys; native package-manager runs)
          #   - init: the sdk-info/init snippet (mobile key,
          #     xcodebuild test boots the simulator and runs
          #     LDClient.start end-to-end)
          #   - sdk-docs: the swift-syntax-only-bound reference
          #     fragments (no LD keys; xcodebuild type-checks the
          #     never-instantiated wrappee)
          - sdk: ios-client-sdk
            runs-on: macos-latest
            key-type: none
            label: ios-client-sdk (install)
            group: sdk-info
            snippet_skip: ios-client-sdk/sdk-info/init
          - sdk: ios-client-sdk
            runs-on: macos-latest
            key-type: mobile
            label: ios-client-sdk (init)
            snippet: ios-client-sdk/sdk-info/init
          - sdk: ios-client-sdk
            runs-on: macos-latest
            key-type: mobile
            label: ios-client-sdk (sdk-docs)
            group: sdk-docs

          # Android init: scaffolded with a MainApplication that
          # exercises LDClient.init(this@MainApplication, ...) under
          # Robolectric. The existing android-client docker validator
          # runs the Android framework in the JVM (no emulator), so the
          # cell stays on a regular ubuntu runner — no KVM/emulator
          # setup required.
          - sdk: android-client-sdk
            runs-on: ubuntu-latest
            key-type: mobile
            label: android-client-sdk (init)
            snippet: android-client-sdk/sdk-info/init

          # Android sdk-docs: Kotlin reference fragments wrapped by
          # kotlin-syntax-only run `./gradlew compileDebugKotlin`
          # against the real launchdarkly-android-client-sdk aar +
          # AndroidX classpath (SNIPPET_CHECK=parse). The compile
          # itself is offline, but the android-client harness
          # `require_env`s LAUNCHDARKLY_FLAG_KEY as a process
          # invariant (it's wired to look it up early); use
          # `key-type: mobile` so verify-hello-app injects the key
          # the harness expects, matching the pattern the
          # cpp-client / flutter / haskell rows use for syntax-only
          # validation.
          - sdk: android-client-sdk
            runs-on: ubuntu-latest
            key-type: mobile
            label: android-client-sdk (sdk-docs)
            group: sdk-docs
            snippet_skip: android-client-sdk/sdk-docs/features/evaluation-reasons/evaluation-reasons-v4-java

          # The v4-era Android fragment routes through the jvm
          # validator (java-syntax-only-v4 stub scaffold — the v5 aar
          # can't compile v4 API surfaces), and the jvm harness
          # `require_env`s LAUNCHDARKLY_SDK_KEY. Split it onto its own
          # row with a server key; the row above skips it.
          - sdk: android-client-sdk
            runs-on: ubuntu-latest
            key-type: server
            label: android-client-sdk (sdk-docs v4 jvm)
            snippet: android-client-sdk/sdk-docs/features/evaluation-reasons/evaluation-reasons-v4-java
          - sdk: android-client-sdk
            runs-on: ubuntu-latest
            key-type: server
            label: android-client-sdk (sdk-docs v4 jvm offline-mode)
            snippet: android-client-sdk/sdk-docs/features/offlinemode/offline-mode-v4-java

          # SDKs whose sdk-docs slice picked up bound syntax-only
          # validators in the docs-validation pass (PR
          # rlamb/sdk-docs-validation). Each matrix row builds the
          # per-SDK Docker image (or, for ios-install, runs the
          # native macos toolchain) and validates every bound
          # sdk-docs snippet end-to-end. The harness consumes a
          # server SDK key for these; the syntax-only scaffolds
          # never reach the LD env (the wrappee body is
          # never-instantiated / never-called), but the harness
          # uniformly requires the env var.
          - { sdk: cpp-client-sdk,    runs-on: ubuntu-latest, key-type: mobile }
          - { sdk: cpp-server-sdk,    runs-on: ubuntu-latest, key-type: server }
          - { sdk: electron-client-sdk, runs-on: ubuntu-latest, key-type: client }
          - { sdk: flutter-client-sdk,  runs-on: ubuntu-latest, key-type: client }
          - { sdk: haskell-server-sdk,  runs-on: ubuntu-latest, key-type: server }
          - { sdk: rust-server-sdk,     runs-on: ubuntu-latest, key-type: server }

          # Erlang sdk-docs gained bindings via erlang-syntax-only in
          # the multi-check rollout. No LD key needed for the
          # syntax-only scaffold; passing `server` for harness env
          # parity with the existing server-side rows.
          - { sdk: erlang-server-sdk,   runs-on: ubuntu-latest, key-type: server, label: erlang-server-sdk (sdk-docs), group: sdk-docs }

          # Apex sdk-docs: the apex validator runs prettier-plugin-apex's
          # apex-anonymous parser over each staged fragment — the same
          # parser the apex-server-sdk repo's CI uses for its
          # `prettier --check "**/*.cls"` step. Pure offline parse check:
          # no Salesforce scratch org, no LD env.
          - { sdk: apex-server-sdk,     runs-on: ubuntu-latest, key-type: none, label: apex-server-sdk (sdk-docs), group: sdk-docs }

          # Roku sdk-docs: roku-client validator runs the RokuCommunity
          # brighterscript Lexer + Parser on each staged .brs file.
          # No Roku device, no LD env — pure parse check.
          - { sdk: roku-client-sdk,     runs-on: ubuntu-latest, key-type: none, label: roku-client-sdk (sdk-docs), group: sdk-docs }

          # Edge SDKs (config feature-docs): the edge-ts validator runs
          # the TypeScript compiler's transpileModule over each staged
          # fragment — syntax-only, no module resolution or type-check.
          # No edge runtime, no LD env — pure parse check.
          - { sdk: cloudflare-server-sdk,     runs-on: ubuntu-latest, key-type: none, label: cloudflare-server-sdk (sdk-docs), group: sdk-docs }
          - { sdk: vercel-server-sdk,         runs-on: ubuntu-latest, key-type: none, label: vercel-server-sdk (sdk-docs), group: sdk-docs }
          - { sdk: akamai-server-edgekv-sdk,  runs-on: ubuntu-latest, key-type: none, label: akamai-server-edgekv-sdk (sdk-docs), group: sdk-docs }
          - { sdk: fastly-server-sdk,         runs-on: ubuntu-latest, key-type: none, label: fastly-server-sdk (sdk-docs), group: sdk-docs }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install iOS toolchain (macos only)
        if: matrix.runs-on == 'macos-latest'
        run: |
          # macos-latest images ship Xcode + Swift + Ruby preinstalled.
          # CocoaPods and the xcodeproj gem (used by the Podfile harness
          # to synthesize a stub Xcode project) and Carthage are not
          # always preinstalled — install both, gracefully no-oping if
          # they're already there. Carthage installation can be slow on
          # cold runners, so prefer brew's bottle when available.
          set -e
          if ! command -v carthage >/dev/null; then
              brew install carthage
          fi
          if ! command -v pod >/dev/null; then
              sudo gem install cocoapods --no-document
          fi
          sudo gem install xcodeproj --no-document

      - name: Validate
        id: validate
        # SDKs whose only bound snippets are install fragments (e.g.
        # ios-client-sdk: cartfile/package-swift/podfile) don't run any
        # LaunchDarkly client code — they just run package managers in
        # an empty dir. They don't need (and shouldn't pretend to need)
        # the verify-hello-app wrapper, which assumes the validate
        # output will contain "feature flag evaluates to true". Use a
        # plain run for those; verify-hello-app for everything else.
        #
        # `MATRIX_SNIPPET` and `MATRIX_SNIPPET_SKIP` are optional
        # filters: a row can validate just one snippet (sdk=ios + an
        # init row) or exclude one (sdk=ios + the install row that
        # excludes init). The shell builds the right --snippet /
        # --snippet-skip flags from the env so empty values stay out
        # of the command line.
        if: matrix.key-type != 'none'
        uses: launchdarkly/gh-actions/actions/verify-hello-app@verify-hello-app-v2.0.1
        env:
          MATRIX_SDK: ${{ matrix.sdk }}
          MATRIX_SNIPPET: ${{ matrix.snippet }}
          MATRIX_SNIPPET_SKIP: ${{ matrix.snippet_skip }}
          MATRIX_GROUP: ${{ matrix.group }}
        with:
          use_server_key: ${{ matrix.key-type == 'server' }}
          use_client_key: ${{ matrix.key-type == 'client' }}
          use_mobile_key: ${{ matrix.key-type == 'mobile' }}
          role_arn: ${{ vars.AWS_ROLE_ARN_EXAMPLES }}
          command: |
            set -o pipefail
            cd snippets
            args="--sdk=$MATRIX_SDK"
            [ -n "$MATRIX_SNIPPET" ] && args="$args --snippet=$MATRIX_SNIPPET"
            [ -n "$MATRIX_SNIPPET_SKIP" ] && args="$args --snippet-skip=$MATRIX_SNIPPET_SKIP"
            [ -n "$MATRIX_GROUP" ] && args="$args --group=$MATRIX_GROUP"
            go run ./cmd/snippets validate $args \
              --sdks=./sdks --validators=./validators 2>&1 | tee /tmp/validate.log

      - name: Validate (no key)
        if: matrix.key-type == 'none'
        id: validate-no-key
        env:
          MATRIX_SDK: ${{ matrix.sdk }}
          MATRIX_SNIPPET: ${{ matrix.snippet }}
          MATRIX_SNIPPET_SKIP: ${{ matrix.snippet_skip }}
          MATRIX_GROUP: ${{ matrix.group }}
        run: |
          set -o pipefail
          cd snippets
          args="--sdk=$MATRIX_SDK"
          [ -n "$MATRIX_SNIPPET" ] && args="$args --snippet=$MATRIX_SNIPPET"
          [ -n "$MATRIX_SNIPPET_SKIP" ] && args="$args --snippet-skip=$MATRIX_SNIPPET_SKIP"
          [ -n "$MATRIX_GROUP" ] && args="$args --group=$MATRIX_GROUP"
          go run ./cmd/snippets validate $args \
            --sdks=./sdks --validators=./validators 2>&1 | tee /tmp/validate.log

      - name: Record result
        if: always()
        env:
          OUTCOME_KEYED: ${{ steps.validate.outcome }}
          OUTCOME_NOKEY: ${{ steps.validate-no-key.outcome }}
        run: |
          # Exactly one of the two validate steps ran (selected by
          # key-type); the other reports outcome == 'skipped'. Treat
          # 'success' as ok, anything else as fail.
          mkdir -p /tmp/result
          if [ "$OUTCOME_KEYED" = "success" ] || [ "$OUTCOME_NOKEY" = "success" ]; then
              echo "ok" > /tmp/result/status
          else
              echo "fail" > /tmp/result/status
          fi
          [ -f /tmp/validate.log ] && cp /tmp/validate.log /tmp/result/log

      - name: Compute artifact suffix
        if: always()
        id: art
        env:
          LABEL: ${{ matrix.label }}
          SDK: ${{ matrix.sdk }}
        run: |
          # Two rows can share matrix.sdk (ios-client-sdk has separate
          # `install` and `init` rows). Disambiguate via matrix.label
          # — falling back to sdk for the unlabelled rows. Strip
          # characters that aren't safe in artifact paths.
          if [ -n "$LABEL" ]; then
            slug=$(printf '%s' "$LABEL" | tr ' ()/' '----' | tr -s '-' | sed 's/-$//')
          else
            slug=$SDK
          fi
          echo "slug=$slug" >> "$GITHUB_OUTPUT"

      - name: Upload result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: result-${{ steps.art.outputs.slug }}
          path: /tmp/result/
          if-no-files-found: ignore
          retention-days: 14

  summary:
    name: Validation summary
    if: always()
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: results
          pattern: result-*

      - name: Build markdown table
        run: |
          {
            echo "## Snippet validation summary"
            echo
            echo "Run: \`${{ github.run_id }}\` · Commit: \`${{ github.sha }}\`"
            echo
            echo "| SDK | Result | Excerpt |"
            echo "|---|---|---|"
            for d in results/result-*; do
              [ -d "$d" ] || continue
              sdk=$(basename "$d" | sed 's/^result-//')
              status="unknown"
              [ -f "$d/status" ] && status=$(cat "$d/status")
              if [ "$status" = "ok" ]; then
                  echo "| \`$sdk\` | ok | |"
              else
                  excerpt=""
                  if [ -f "$d/log" ]; then
                      excerpt=$(tail -n 50 "$d/log" \
                        | grep -v '^$' \
                        | tail -n 3 \
                        | sed -e 's/|/\\|/g' -e 's/`/\\`/g' \
                        | tr '\n' ' ')
                  fi
                  echo "| \`$sdk\` | **FAIL** | $excerpt |"
              fi
            done
            echo
            echo "Per-job logs are uploaded as \`result-<sdk>\` artifacts (14-day retention)."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail summary if any cell failed
        run: |
          for d in results/result-*; do
            [ -d "$d" ] || continue
            if [ -f "$d/status" ] && [ "$(cat "$d/status")" != "ok" ]; then
                echo "At least one validator failed; see step summary above." >&2
                exit 1
            fi
          done
